<!DOCTYPE html>
<html lang ="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign-up as a Customer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <!--Using Pure CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Using Bootstrap CSS -->
    <style>
        .mainContent {
            display:block;
            margin-left: 450px;
            margin-right: 450px;
            margin-top: 50px;
        }    
    </style>

    </head>
    <body style="background-color:rgba(85, 107, 47, 0.781)">
        <div class="mainContent">               <!--main place for signup to go in-->
            <div>
                <div class="card" style="background-color: rgba(248, 252, 255, 0.623); border-radius: 3px; padding-top: 8px;">
                    <div class="card-body">
                        <h5 class="card-title" style="text-align: center;">Customer sign-up</h5>
                        <p class="card-text">
                            <fieldset>
                                <form class="pure-form">
                                <label for="email">Email:</label>
                                <input id="email" type="text" style="border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-left: 27px;" required=""/>
                                </form>
                                <br>
                                 <form class="pure-form">
                                <label for="password">Password:</label>
                                <input id="password" type="text" style="border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" required=""/>
                                </form>
                                <br>
                                 <form class="pure-form">
                                <label for="name">Name:</label>
                                <input id="name" type="text" style="border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-left: 24px" required=""/>
                                </form>
                                <br>
                                <label for="skill">Skill-level:</label>
                                <select id="location" name="State"  style="margin-left: 31px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" required>
                                    <option value="">Select</option>
                                    <option value="begineer">Begineer</option>
                                    <option value="intermediate">Intermedaite</option>
                                    <option value="advanced">Advanced</option>
                                    
                                </select>
                            </fieldset>
                        </p>
                        <p style="text-align: center;"><a href="customer.html" class="btn btn-dark">Sign up</a></p>
                        <p>
                        <a href="../provider-prototype/providerSignup.html">Sign up as provider</a> •
                        <a href="../customer/login.html">Already have an account? Log in</a>
                    </div>
                    </div>
                </div>
        </div>
    </body>
</html>
